name: Deploy

on:
  push:
    branches:
      - main     # → production
      - develop  # → staging

env:
  REGISTRY:       ghcr.io
  IMAGE_NAME:     ${{ github.repository }}

jobs:
  build-push:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      - name: Set environment label
        id: env_label
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "ENV=production" >> $GITHUB_OUTPUT
          else
            echo "ENV=staging"    >> $GITHUB_OUTPUT
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/php/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy to Staging
    needs: build-push
    runs-on: ubuntu-latest
    if: github.ref_name == 'develop'
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > ~/.kube/config

      - name: Deploy to staging namespace
        run: |
          kubectl set image deployment/allleads-app \
            php=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }} \
            -n allleads-staging
          kubectl rollout status deployment/allleads-app -n allleads-staging --timeout=120s

      - name: Run migrations on staging
        run: |
          kubectl exec -n allleads-staging deployment/allleads-app -- \
            php artisan migrate --force

  deploy-production:
    name: Deploy to Production
    needs: build-push
    runs-on: ubuntu-latest
    if: github.ref_name == 'main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 -d > ~/.kube/config

      - name: Deploy to production namespace
        run: |
          kubectl set image deployment/allleads-app \
            php=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main \
            -n allleads-production
          kubectl rollout status deployment/allleads-app -n allleads-production --timeout=180s

      - name: Run migrations on production
        run: |
          kubectl exec -n allleads-production deployment/allleads-app -- \
            php artisan migrate --force
