apiVersion: v1
kind: Service
metadata:
  name: allleads-app
  namespace: allleads-production
  labels:
    app: allleads
spec:
  selector:
    app: allleads
    component: app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: allleads-ingress
  namespace: allleads-production
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - app.allleads.io       # replace with your domain
      secretName: allleads-tls
  rules:
    - host: app.allleads.io     # replace with your domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: allleads-app
                port:
                  number: 80
